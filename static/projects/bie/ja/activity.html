</tbody></table></figure>

<td width="800">理研シンポジウム 「Mechanistic Insights into Neurodegenerative Disorders ~」 Online（Tanaka group）68 participants</td></tr>

<td width="800">ワークショップ「Symposium on Computer Simulations and Cryo-ET/EM of Complex Biomolecular Systems」Online, Organized by Song, Chen (Peking U.), 高田彰二（京都大学）, 杉田有治（理化学研究所）（Sugita group）</td></tr>
</tbody></table></figure>


<h3 class="wp-block-heading">新聞記事・プレスリリース</h3>


</p>

<figure class="wp-block-table is-style-stripes"><table><tbody>
<tr><td>3月18日(2022)</td>
<td width="800">理化学研究所プレスリリース「植物の細胞分裂期の代謝物質を解明－1細胞解析で高精度に捉えられた細胞の中身－」(Matsui group) </td></tr>
<tr><td>2月18日(2022)</td>
<td width="800">理化学研究所・東京工業大学プレスリリース「アミロイドの脱凝集メカニズムを解明－アミロイド構造に依存した脱凝集機構が明らかに－」（Tanaka group）</td></tr>
<tr><td>2月18日(2022)</td>
<td width="800">理研プレスリリース「アミロイドの脱凝集メカニズムを解明」[Collaboration] (Tanaka group, Sako group)</td></tr>
<tr><td>2月10日(2022)</td>
<td width="800">理研プレスリリース「シグナル伝達の「偏り」を生み出すリン酸化機構の解明」(Sako group)</td></tr>
<tr><td>1月21日(2022)</td>
<td width="800">理研プレスリリース「シグナル伝達による多様な細胞応答の起源」(Sako group)</td></tr>
<tr><td>1月19日(2022)</td>
<td width="800">理研プレスリリース「mRNAの安定性は遺伝暗号コドンの組み合わせによって変化する。その原因は「リボソームの減速」 (Iwasaki group)</td></tr>
<tr><td>12月7日</td>
<td width="800">理研プレスリリース「細胞がグルコース代謝量を制御する巧妙な仕組み－細胞中のATP濃度に依存した酵素活性の新たな制御機構の解明－」 (Kigawa group) </td></tr>
<tr><td>12月7日</td>
<td width="800">理研プレスリリース「ウイルスによる細胞のストレス応答機構の解明」[Collaboration] (Ito group, Iwasaki group)</td></tr>
<tr><td>11月17日</td>
<td width="800">理研プレスリリース「タンパク質の連続的な合成を保証するリボソーム「トンネル」の役割を発見－新しく作られたタンパク質の長さや大きさで、合成の不安定性を制御する－」(Iwasaki group)</td></tr>
<tr><td>11月10日</td>
<td width="800">理研プレスリリース「指定難病に関わるタンパク質が脂質の二重層内動態を促進」(Sako Group)</td></tr>
<tr><td>11月10日</td>
<td width="800">日刊工業新聞「難病関与たんぱく質、細胞膜の脂質移動　理研が仕組み解明」(Sako group) </td></tr>
<tr><td>9月28日</td>
<td width="800">理研プレスリリース「生体膜カルシウムイオン輸送の分子機構を解明　−ATPによるタンパク質の輸送機構に新しい知見−」(Sugita group) </td></tr>
<tr><td>9月14日</td>
<td width="800">理研プレスリリース「イントロン由来の異常タンパク質が与えるストレス－スプライシング調節化合物による抗がんメカニズムを解明－」(Iwasaki group) </td></tr>
<tr><td>8月30日</td>
<td width="800">薬事日報「東大、理研グループ　DNAから合理的に設計　スマートな細胞増殖因子」 (Sako group)</td></tr>
<tr><td>8月2日</td>
<td width="800">理研プレスリリース「細胞シグナルを精密に制御する、スマートな人工細胞増殖因子の開発に成功」(Sako group) </td></tr>
<tr><td>7月9日</td>
<td width="800">理研プレスリリース「混雑した細胞内で薬はどう効くのか　−生体内環境を考慮した酵素と阻害剤の結合シミュレーション−」[Collaboration] (Sugita group, Shirouzu group) </td></tr>
<tr><td>7月6日</td>
<td width="800">理研プレスリリース「非典型的開始コドンからの翻訳開始機構を解明－がん等の治療法開発に期待－」(Iwasaki group)  </td></tr>
<tr><td>6月30日</td>
<td width="800">理研プレスリリース「植物の小さなRNAが巨大なタンパク質合成装置の動きを止める－そのしくみと意外な役割を解明－」(Iwasaki group)</td></tr>
<tr><td>6月4日</td>
<td width="800">基礎生物学研究所プレスリリース「動く分子と動かない分子が協調して、安定した位置情報を素早く作り出す」(Sako group)</td></tr>
<tr><td>4月19日</td>
<td width="800">理研プレスリリース「オートファジーによるmRNA分解の選択性を発見 －遺伝子発現におけるオートファジーの新たな働き－」(Iwasaki group) </td></tr>
</tbody></table></figure>

<figure class="wp-block-table is-style-stripes"><table><tbody>
<tr><td>3月23日(2022)</td>
<td width="800">「理研栄峰賞」受賞。杉田有治、Jung, Jaewoon、小林千草、森貴治、八木清、Dokainish, Hisham Mohammed Mohammed、尾嶋拓、「『富岳』に最適化されたGENESISの開発と公開、およびSARS-Cov-2スパイクタンパク質のMDシミュレーション」（Sugita group）</td></tr>
