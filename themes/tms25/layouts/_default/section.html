{{- define "main" -}}
  <header class="page-header">
    {{ partial "page-banner.html" . }}
    <div class="header-content">
      <div class="inner">
        {{- $title := .Section | title }}
        <h1>{{ i18n $title }}</h1>
      </div>
    </div>
  </header>
  <div class="breadcrumbs">
    <div class="inner">
      {{ partial "breadcrumbs.html" . }}
    </div>
  </div><!-- /.breadcrumbs -->
  <div class="is-flex inner">
    {{ partial "sidebar.html" . }}
    <div class="cont">
      {{ .Content }}
    </div>
  </div>
{{- end -}}
